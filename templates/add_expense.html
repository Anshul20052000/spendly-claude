{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/expenses.css') }}">
{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Record a new expense to track your spending</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" placeholder="e.g. 450.00"
                           step="0.01" min="0.01"
                           value="{{ request.form.get('amount', '') }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not request.form.get('category') %}selected{% endif %}>Select a category</option>
                        {% set categories = ["Food", "Transport", "Bills", "Health", "Entertainment", "Shopping", "Other"] %}
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if request.form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ request.form.get('date', '') }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="e.g. Lunch at Saravana Bhavan"
                           maxlength="200"
                           value="{{ request.form.get('description', '') }}"
                           required>
                </div>
                <button type="submit" class="btn-submit">Add Expense</button>
            </form>
        </div>

    </div>
</section>

{% endblock %}
